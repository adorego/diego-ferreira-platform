name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm turbo build

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy API
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service df-api --detach
        working-directory: apps/api

      - name: Deploy Web
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service df-web --detach
        working-directory: apps/web

      - name: Deploy Admin
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service df-admin --detach
        working-directory: apps/admin

      - name: Notify success
        if: success()
        run: echo "Deploy completado — commit ${{ github.sha }}"

      - name: Notify failure
        if: failure()
        run: echo "Deploy FALLIDO — commit ${{ github.sha }}"
