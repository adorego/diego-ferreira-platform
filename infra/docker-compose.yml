services:
  postgres:
    image: postgres:16-alpine
    container_name: df_postgres
    environment:
      POSTGRES_USER:     df
      POSTGRES_PASSWORD: df_dev
      POSTGRES_DB:       df_platform
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U df -d df_platform"]
      interval: 5s
      timeout:  5s
      retries:  10

  redis:
    image: redis:7-alpine
    container_name: df_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout:  3s
      retries:  5

volumes:
  pg_data: