[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = [
  "npm install -g pnpm@9 --force && pnpm install --frozen-lockfile"
]

[phases.build]
cmds = ["npm install -g pnpm@9 --force && pnpm --filter @df/web build"]

[start]
cmd = "npm install -g pnpm@9 --force && cd apps/web && pnpm start"